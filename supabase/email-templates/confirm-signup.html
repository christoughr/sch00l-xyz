<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome to sch00l.ai</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0f;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0a0a0f;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="100%" style="max-width:480px;background:#14141c;border:1px solid rgba(255,255,255,0.1);border-radius:16px;">
          <tr>
            <td style="padding:32px 28px;">
              <p style="margin:0 0 8px;font-size:22px;font-weight:700;color:#ffffff;">Welcome to sch00l</p>
              <p style="margin:0 0 24px;font-size:14px;color:#a1a1aa;line-height:1.5;">
                Confirm your email <strong style="color:#e4e4e7;">{{ .Email }}</strong> to save progress and flashcards across devices.
              </p>
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;background:#6366f1;color:#ffffff;text-decoration:none;font-weight:600;font-size:15px;padding:14px 24px;border-radius:12px;">
                Confirm email
              </a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
