<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500">
      <stop stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#4338ca"/>
      <stop offset="1" stop-color="#0c0c12"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="30%" r="60%">
